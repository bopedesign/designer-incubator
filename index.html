<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Designer Hypothesis Incubator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: #0f0f0f;
    color: #e8e4dc;
    min-height: 100vh;
    padding: 48px 24px;
  }

  .container { max-width: 900px; margin: 0 auto; }

  h1 {
    font-size: 16px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #c8c4bc;
    margin-bottom: 48px;
    font-weight: normal;
  }

  .section-label {
    font-size: 14px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #c8c4bc;
    font-weight: normal;
    margin-bottom: 6px;
  }

  .section-sub {
    font-size: 14px;
    color: #a8a49c;
    margin-bottom: 20px;
  }

  .input-section { margin-bottom: 32px; }

  label {
    display: block;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #c8c4bc;
    margin-bottom: 10px;
  }

  textarea {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #3a3a3a;
    color: #e8e4dc;
    font-family: 'Georgia', serif;
    font-size: 16px;
    line-height: 1.7;
    padding: 16px;
    resize: vertical;
    outline: none;
    border-radius: 2px;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: #6a6560; }
  textarea::placeholder { color: #5a5a5a; }

  input[type="url"], input[type="password"] {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #3a3a3a;
    color: #e8e4dc;
    font-family: 'Georgia', serif;
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    border-radius: 2px;
    transition: border-color 0.2s;
  }

  input[type="url"]:focus, input[type="password"]:focus { border-color: #6a6560; }
  input[type="file"] { display: none; }

  .file-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }

  .file-label {
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #c8c4bc;
    border: 1px solid #3a3a3a;
    padding: 12px 20px;
    cursor: pointer;
    border-radius: 2px;
    transition: border-color 0.2s, color 0.2s;
    white-space: nowrap;
  }

  .file-label:hover { border-color: #6a6560; color: #e8e4dc; }

  .file-name { font-size: 15px; color: #a8a49c; }

  .url-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .url-row input { flex: 1; }

  .fetch-status {
    font-size: 13px;
    color: #a8a49c;
    margin-top: 8px;
    min-height: 18px;
  }

  .fetch-status.error { color: #d87060; }

  .review-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 32px;
  }

  @media (max-width: 640px) {
    .review-fields { grid-template-columns: 1fr; }
  }

  .api-row {
    display: flex;
    gap: 16px;
    margin-bottom: 40px;
    align-items: flex-end;
  }

  .api-row .input-section { margin-bottom: 0; flex: 1; }

  .btn-primary {
    background: #e8e4dc;
    color: #0f0f0f;
    border: none;
    font-family: 'Georgia', serif;
    font-size: 14px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 14px 32px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .btn-primary:hover { background: #ffffff; }
  .btn-primary:disabled { background: #2a2a2a; color: #5a5a5a; cursor: not-allowed; }

  .btn-secondary {
    background: transparent;
    color: #e8e4dc;
    border: 1px solid #3a3a3a;
    font-family: 'Georgia', serif;
    font-size: 14px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 12px 24px;
    cursor: pointer;
    border-radius: 2px;
    transition: border-color 0.2s;
    white-space: nowrap;
  }

  .btn-secondary:hover { border-color: #6a6560; }
  .btn-secondary:disabled { color: #5a5a5a; cursor: not-allowed; }

  .btn-small {
    background: transparent;
    color: #c8c4bc;
    border: 1px solid #3a3a3a;
    font-family: 'Georgia', serif;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 12px 16px;
    cursor: pointer;
    border-radius: 2px;
    white-space: nowrap;
    transition: border-color 0.2s;
  }

  .btn-small:hover { border-color: #6a6560; }
  .btn-small:disabled { color: #5a5a5a; cursor: not-allowed; }

  .divider {
    border: none;
    border-top: 1px solid #2a2a2a;
    margin: 48px 0;
  }

  .status { font-size: 15px; color: #a8a49c; margin-bottom: 32px; font-style: italic; }
  .error-msg { font-size: 15px; color: #d87060; margin-bottom: 32px; }

  .cards-grid { display: grid; grid-template-columns: 1fr; gap: 2px; margin-bottom: 48px; }

  .card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 2px;
    overflow: hidden;
  }

  .card-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  .card-number { font-size: 14px; letter-spacing: 0.1em; color: #a8a49c; flex-shrink: 0; }
  .card-title { font-size: 18px; color: #e8e4dc; font-weight: normal; }
  .card-subtitle { font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; color: #a8a49c; flex-shrink: 0; }

  .tab-bar { display: flex; border-bottom: 1px solid #2a2a2a; }

  .tab {
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #a8a49c;
    padding: 13px 20px;
    cursor: pointer;
    border: none;
    background: transparent;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s;
    font-family: 'Georgia', serif;
  }

  .tab:hover { color: #c8c4bc; }
  .tab.active { color: #e8e4dc; border-bottom-color: #e8e4dc; }

  .tab-content {
    padding: 24px;
    font-size: 16px;
    line-height: 1.8;
    color: #c8c4bc;
    display: none;
  }

  .tab-content.active { display: block; }

  .ranking-result {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 2px;
    padding: 32px;
    margin-top: 32px;
  }

  .ranking-result h3 {
    font-size: 14px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #c8c4bc;
    font-weight: normal;
    margin-bottom: 24px;
  }

  .rank-list { list-style: none; margin-bottom: 32px; }

  .rank-item {
    display: flex;
    align-items: baseline;
    gap: 16px;
    padding: 16px 0;
    border-bottom: 1px solid #2a2a2a;
  }

  .rank-item:last-child { border-bottom: none; }

  .rank-num { font-size: 14px; color: #a8a49c; width: 24px; flex-shrink: 0; }
  .rank-title { font-size: 17px; color: #e8e4dc; }
  .rank-tag { font-size: 13px; text-transform: uppercase; color: #a8a49c; margin-left: auto; flex-shrink: 0; }

  .rank-reason {
    font-size: 15px;
    line-height: 1.8;
    color: #a8a49c;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid #2a2a2a;
  }

  .rank-reason h4 {
    font-size: 14px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #c8c4bc;
    font-weight: normal;
    margin-bottom: 16px;
  }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="container">

  <h1>Designer Hypothesis Incubator</h1>

  <!-- REVIEW INTELLIGENCE LAYER (top, always visible) -->
  <div class="section-label">Review Intelligence Layer</div>
  <p class="section-sub">Paste Google Maps URLs to fetch reviews. You can test this before generating hypotheses.</p>

  <div class="review-fields">
    <div class="input-section">
      <label for="clientReviews">Client Reviews</label>
      <textarea id="clientReviews" rows="8" placeholder="Paste your client's Google reviews here…"></textarea>
    </div>
    <div class="input-section">
      <label for="competitorReviews">Competitor Reviews</label>
      <textarea id="competitorReviews" rows="8" placeholder="Paste competitor Google reviews here…"></textarea>
    </div>
  </div>

  <hr class="divider">

  <!-- BRIEF + GENERATION -->
  <div class="section-label" style="margin-bottom:20px;">Client Brief</div>

  <div class="input-section">
    <label for="briefText">Brief Text</label>
    <textarea id="briefText" rows="10" placeholder="Paste your client brief here…"></textarea>
  </div>

  <div class="file-row">
    <label class="file-label" for="pdfInput">Upload PDF Brief</label>
    <input type="file" id="pdfInput" accept=".pdf">
    <span class="file-name" id="fileName">No file selected</span>
  </div>

  <div class="api-row">
    <div class="input-section">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="sk-ant-…">
    </div>
    <button class="btn-primary" id="generateBtn" onclick="generateHypotheses()">Generate Hypotheses</button>
  </div>

  <div class="status hidden" id="status">Generating hypotheses…</div>
  <div class="error-msg hidden" id="errorMsg"></div>

  <div class="cards-grid hidden" id="cardsGrid"></div>

  <!-- RANK -->
  <div class="hidden" id="rankSection">
    <hr class="divider">
    <button class="btn-secondary" id="rankBtn" onclick="rankHypotheses()">Rank the Bets</button>
    <div class="status hidden" id="rankStatus">Analyzing reviews…</div>
    <div class="error-msg hidden" id="rankErrorMsg"></div>
    <div class="ranking-result hidden" id="rankingResult">
      <h3>Ranked Bets</h3>
      <ol class="rank-list" id="rankList"></ol>
      <div class="rank-reason">
        <h4>Why this ranking</h4>
        <div id="rankReason"></div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let extractedPdfText = null;
  let generatedCards = [];

  document.getElementById('pdfInput').addEventListener('change', async function(e) {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById('fileName').textContent = file.name + ' — extracting text...';
    try {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let fullText = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        fullText += content.items.map(function(item) { return item.str; }).join(' ') + '\n';
      }
      extractedPdfText = fullText.trim();
      document.getElementById('fileName').textContent = file.name + ' (' + pdf.numPages + ' pages extracted)';
    } catch(err) {
      document.getElementById('fileName').textContent = 'Error reading PDF — ' + err.message;
      extractedPdfText = null;
    }
  });

  function setTab(cardIndex, tabName) {
    const card = document.querySelectorAll('.card')[cardIndex];
    card.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    card.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
    card.querySelector('.tab[data-tab="' + tabName + '"]').classList.add('active');
    card.querySelector('.tab-content[data-tab="' + tabName + '"]').classList.add('active');
  }

  function renderCards(cards) {
    generatedCards = cards;
    const grid = document.getElementById('cardsGrid');
    grid.innerHTML = '';
    cards.forEach(function(card, i) {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML =
        '<div class="card-header">' +
          '<span class="card-number">' + String(i + 1).padStart(2, '0') + '</span>' +
          '<span class="card-title">' + card.title + '</span>' +
          '<span class="card-subtitle">' + (card.tag || '') + '</span>' +
        '</div>' +
        '<div class="tab-bar">' +
          '<button class="tab active" data-tab="hypothesis" onclick="setTab(' + i + ',\'hypothesis\')">Hypothesis</button>' +
          '<button class="tab" data-tab="why" onclick="setTab(' + i + ',\'why\')">Why</button>' +
          '<button class="tab" data-tab="measurements" onclick="setTab(' + i + ',\'measurements\')">Measurements</button>' +
        '</div>' +
        '<div class="tab-content active" data-tab="hypothesis">' + card.hypothesis + '</div>' +
        '<div class="tab-content" data-tab="why">' + card.why + '</div>' +
        '<div class="tab-content" data-tab="measurements">' + card.measurements + '</div>';
      grid.appendChild(el);
    });
    grid.classList.remove('hidden');
    document.getElementById('rankSection').classList.remove('hidden');
  }

  async function fetchReviews(type) {
    const urlId = type === 'client' ? 'clientReviewUrl' : 'competitorReviewUrl';
    const textareaId = type === 'client' ? 'clientReviews' : 'competitorReviews';
    const statusId = type === 'client' ? 'clientReviewStatus' : 'competitorReviewStatus';
    const btnId = type === 'client' ? 'fetchClientBtn' : 'fetchCompetitorBtn';

    const url = document.getElementById(urlId).value.trim();
    if (!url) { alert('Please enter a Google Maps URL.'); return; }

    const btn = document.getElementById(btnId);
    const status = document.getElementById(statusId);
    btn.disabled = true;
    status.className = 'fetch-status';
    status.textContent = 'Creating task…';

    try {
      // Step 1: Create the task
      const createResp = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'create_review_task', url: url })
      });
      const createRaw = await createResp.text();
      let createData;
      try { createData = JSON.parse(createRaw); } catch(e) { throw new Error(createRaw.substring(0, 200)); }
      if (createData.error) throw new Error(createData.error);
      const taskId = createData.taskId;

      // Step 2: Poll for results
      let attempts = 0;
      const maxAttempts = 20;
      while (attempts < maxAttempts) {
        await new Promise(resolve => setTimeout(resolve, 3000));
        attempts++;
        status.textContent = 'Waiting for results… (' + (attempts * 3) + 's)';

        const getResp = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'get_review_task', taskId: taskId })
        });
        const getRaw = await getResp.text();
        let getData;
        try { getData = JSON.parse(getRaw); } catch(e) { throw new Error(getRaw.substring(0, 200)); }
        if (getData.error) throw new Error(getData.error);

        if (getData.ready) {
          if (!getData.reviews) throw new Error('No reviews found for this business');
          document.getElementById(textareaId).value = getData.reviews;
          const count = getData.reviews.split('\n\n').length;
          status.textContent = count + ' reviews fetched.';
          btn.disabled = false;
          return;
        }
      }
      throw new Error('Timed out waiting for reviews');
    } catch(err) {
      status.className = 'fetch-status error';
      status.textContent = 'Error: ' + err.message;
    }
    btn.disabled = false;
  }

  async function generateHypotheses() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const briefText = document.getElementById('briefText').value.trim();
    const errEl = document.getElementById('errorMsg');

    if (!apiKey) { alert('Please enter your API key.'); return; }
    if (!briefText && !extractedPdfText) { alert('Please enter a brief or upload a PDF.'); return; }

    document.getElementById('generateBtn').disabled = true;
    document.getElementById('status').classList.remove('hidden');
    errEl.classList.add('hidden');
    document.getElementById('cardsGrid').classList.add('hidden');
    document.getElementById('rankSection').classList.add('hidden');

    const systemPrompt = 'You are a brand strategy and design hypothesis expert. Given a client brief, generate exactly 5 distinct design hypotheses. Each hypothesis should represent a genuinely different strategic bet on what the brand\'s core positioning and design direction should be.\n\nReturn ONLY valid JSON with this exact structure, no markdown, no preamble:\n{\n  "hypotheses": [\n    {\n      "title": "Short evocative title",\n      "tag": "2-word descriptor",\n      "hypothesis": "The core design hypothesis — what this bet is and what it would look like if true.",\n      "why": "The strategic rationale — why this direction, what market insight drives it, what competitor gap it exploits.",\n      "measurements": "How you would know if this bet is working — specific design quality criteria and success signals."\n    }\n  ]\n}';

    let combinedText = '';
    if (extractedPdfText) combinedText += extractedPdfText + '\n\n';
    if (briefText) combinedText += briefText;
    const userContent = 'Generate 5 design hypotheses from this brief:\n\n' + combinedText;

    try {
      const response = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 3000,
          system: systemPrompt,
          messages: [{ role: 'user', content: userContent }]
        })
      });

      const raw = await response.text();
      let data;
      try { data = JSON.parse(raw); } catch(e) { throw new Error('API returned: ' + raw.substring(0, 200)); }
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

      const text = data.content && data.content[0] ? data.content[0].text : '';
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      renderCards(parsed.hypotheses);
      document.getElementById('status').classList.add('hidden');
    } catch (err) {
      document.getElementById('status').classList.add('hidden');
      errEl.textContent = 'Error: ' + err.message;
      errEl.classList.remove('hidden');
    }
    document.getElementById('generateBtn').disabled = false;
  }

  async function rankHypotheses() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const clientReviews = document.getElementById('clientReviews').value.trim();
    const competitorReviews = document.getElementById('competitorReviews').value.trim();
    const rankErrEl = document.getElementById('rankErrorMsg');

    if (!clientReviews && !competitorReviews) { alert('Please fetch or paste at least one set of reviews.'); return; }
    if (generatedCards.length === 0) { alert('Please generate hypotheses first.'); return; }

    document.getElementById('rankBtn').disabled = true;
    document.getElementById('rankStatus').classList.remove('hidden');
    rankErrEl.classList.add('hidden');
    document.getElementById('rankingResult').classList.add('hidden');

    const cardSummaries = generatedCards.map(function(c, i) {
      return 'Bet ' + (i + 1) + ': "' + c.title + '" — ' + c.hypothesis;
    }).join('\n\n');

    const systemPrompt = 'You are a brand strategist analyzing Google reviews to determine which strategic bet is most strongly supported by real customer voice.\n\nAnalyze the contrast between client and competitor reviews to determine which bets are most grounded in real market reality. Look for: what customers consistently praise about the client that competitors don\'t offer; what competitors are missing; what emotional language customers use; gaps between what the client thinks their differentiator is and what customers actually value.\n\nReturn ONLY valid JSON, no markdown, no preamble:\n{\n  "ranked": [\n    { "rank": 1, "title": "exact title of bet", "signal": "brief 3-5 word signal" },\n    { "rank": 2, "title": "exact title of bet", "signal": "brief 3-5 word signal" },\n    { "rank": 3, "title": "exact title of bet", "signal": "brief 3-5 word signal" },\n    { "rank": 4, "title": "exact title of bet", "signal": "brief 3-5 word signal" },\n    { "rank": 5, "title": "exact title of bet", "signal": "brief 3-5 word signal" }\n  ],\n  "reasoning": "2-3 paragraphs explaining what the reviews revealed and why the top-ranked bet is the strongest strategic direction."\n}';

    const userMessage = 'Five hypothesis bets:\n\n' + cardSummaries + '\n\n---\n\nClient Reviews:\n' + (clientReviews || 'None provided') + '\n\n---\n\nCompetitor Reviews:\n' + (competitorReviews || 'None provided') + '\n\nRank the five bets.';

    try {
      const response = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1500,
          system: systemPrompt,
          messages: [{ role: 'user', content: userMessage }]
        })
      });

      const raw = await response.text();
      let data;
      try { data = JSON.parse(raw); } catch(e) { throw new Error(raw.substring(0, 200)); }
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

      const text = data.content && data.content[0] ? data.content[0].text : '';
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      const list = document.getElementById('rankList');
      list.innerHTML = '';
      parsed.ranked.forEach(function(item) {
        const li = document.createElement('li');
        li.className = 'rank-item';
        li.innerHTML =
          '<span class="rank-num">' + item.rank + '</span>' +
          '<span class="rank-title">' + item.title + '</span>' +
          '<span class="rank-tag">' + item.signal + '</span>';
        list.appendChild(li);
      });

      document.getElementById('rankReason').innerHTML = parsed.reasoning.replace(/\n\n/g, '<br><br>');
      document.getElementById('rankingResult').classList.remove('hidden');
      document.getElementById('rankStatus').classList.add('hidden');
    } catch (err) {
      document.getElementById('rankStatus').classList.add('hidden');
      rankErrEl.textContent = 'Error: ' + err.message;
      rankErrEl.classList.remove('hidden');
    }
    document.getElementById('rankBtn').disabled = false;
  }
</script>
</body>
</html>
