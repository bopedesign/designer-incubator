<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Designer Hypothesis Incubator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: #0f0f0f;
    color: #e8e4dc;
    min-height: 100vh;
    padding: 48px 24px;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  h1 {
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #6b6560;
    margin-bottom: 48px;
    font-family: 'Georgia', serif;
    font-weight: normal;
  }

  .input-section {
    margin-bottom: 40px;
  }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #6b6560;
    margin-bottom: 10px;
  }

  textarea {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #e8e4dc;
    font-family: 'Georgia', serif;
    font-size: 15px;
    line-height: 1.7;
    padding: 16px;
    resize: vertical;
    outline: none;
    border-radius: 2px;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: #4a4540; }

  .file-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
  }

  input[type="file"] { display: none; }

  .file-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #6b6560;
    border: 1px solid #2a2a2a;
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 2px;
    transition: border-color 0.2s, color 0.2s;
  }

  .file-label:hover { border-color: #4a4540; color: #e8e4dc; }

  .file-name {
    font-size: 13px;
    color: #4a4540;
  }

  .api-row {
    display: flex;
    gap: 16px;
    margin-bottom: 40px;
    align-items: flex-end;
  }

  .api-row .input-section { margin-bottom: 0; flex: 1; }

  input[type="password"] {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #e8e4dc;
    font-family: 'Georgia', serif;
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    border-radius: 2px;
    transition: border-color 0.2s;
  }

  input[type="password"]:focus { border-color: #4a4540; }

  .btn-primary {
    background: #e8e4dc;
    color: #0f0f0f;
    border: none;
    font-family: 'Georgia', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 14px 32px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .btn-primary:hover { background: #ffffff; }
  .btn-primary:disabled { background: #2a2a2a; color: #4a4540; cursor: not-allowed; }

  .btn-secondary {
    background: transparent;
    color: #e8e4dc;
    border: 1px solid #2a2a2a;
    font-family: 'Georgia', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 12px 28px;
    cursor: pointer;
    border-radius: 2px;
    transition: border-color 0.2s;
    white-space: nowrap;
  }

  .btn-secondary:hover { border-color: #4a4540; }
  .btn-secondary:disabled { color: #4a4540; cursor: not-allowed; }

  .status {
    font-size: 13px;
    color: #6b6560;
    margin-bottom: 40px;
    font-style: italic;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 2px;
    margin-bottom: 64px;
  }

  .card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 2px;
    overflow: hidden;
  }

  .card-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }

  .card-number {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #4a4540;
    flex-shrink: 0;
  }

  .card-title {
    font-size: 17px;
    color: #e8e4dc;
    font-weight: normal;
  }

  .card-subtitle {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #4a4540;
    flex-shrink: 0;
  }

  .tab-bar {
    display: flex;
    border-bottom: 1px solid #2a2a2a;
  }

  .tab {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #4a4540;
    padding: 12px 20px;
    cursor: pointer;
    border: none;
    background: transparent;
    border-bottom: 1px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s;
    font-family: 'Georgia', serif;
  }

  .tab:hover { color: #a8a49c; }
  .tab.active { color: #e8e4dc; border-bottom-color: #e8e4dc; }

  .tab-content {
    padding: 24px;
    font-size: 15px;
    line-height: 1.8;
    color: #c8c4bc;
    display: none;
  }

  .tab-content.active { display: block; }

  .divider {
    border: none;
    border-top: 1px solid #2a2a2a;
    margin: 64px 0;
  }

  .review-section-header {
    margin-bottom: 32px;
  }

  .review-section-header h2 {
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #6b6560;
    font-weight: normal;
    margin-bottom: 8px;
  }

  .review-section-header p {
    font-size: 14px;
    color: #4a4540;
    line-height: 1.6;
  }

  .review-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 32px;
  }

  @media (max-width: 640px) {
    .review-fields { grid-template-columns: 1fr; }
    .api-row { flex-direction: column; }
  }

  .ranking-result {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 2px;
    padding: 32px;
    margin-top: 40px;
  }

  .ranking-result h3 {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #6b6560;
    font-weight: normal;
    margin-bottom: 24px;
  }

  .rank-list {
    list-style: none;
    margin-bottom: 32px;
  }

  .rank-item {
    display: flex;
    align-items: baseline;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid #2a2a2a;
  }

  .rank-item:last-child { border-bottom: none; }

  .rank-num {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: #4a4540;
    width: 20px;
    flex-shrink: 0;
  }

  .rank-title {
    font-size: 16px;
    color: #e8e4dc;
  }

  .rank-tag {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #4a4540;
    margin-left: auto;
    flex-shrink: 0;
  }

  .rank-reason {
    font-size: 14px;
    line-height: 1.7;
    color: #6b6560;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid #2a2a2a;
  }

  .rank-reason h4 {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #4a4540;
    font-weight: normal;
    margin-bottom: 16px;
  }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="container">

  <h1>Designer Hypothesis Incubator</h1>

  <div class="input-section">
    <label>Client Brief</label>
    <textarea id="briefText" rows="10" placeholder="Paste your client brief here…"></textarea>
  </div>

  <div class="file-row">
    <label class="file-label" for="pdfInput">Upload PDF Brief</label>
    <input type="file" id="pdfInput" accept=".pdf">
    <span class="file-name" id="fileName">No file selected</span>
  </div>

  <div class="api-row">
    <div class="input-section">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="sk-ant-…">
    </div>
    <button class="btn-primary" id="generateBtn" onclick="generateHypotheses()">Generate Hypotheses</button>
  </div>

  <div class="status hidden" id="status">Generating hypotheses…</div>

  <div class="cards-grid hidden" id="cardsGrid"></div>

  <hr class="divider hidden" id="reviewDivider">

  <div class="hidden" id="reviewSection">
    <div class="review-section-header">
      <h2>Review Intelligence Layer</h2>
      <p>Paste Google reviews to rank the hypotheses against real customer voice.</p>
    </div>

    <div class="review-fields">
      <div class="input-section">
        <label>Client Reviews</label>
        <textarea id="clientReviews" rows="12" placeholder="Paste your client's Google reviews here…"></textarea>
      </div>
      <div class="input-section">
        <label>Competitor Reviews</label>
        <textarea id="competitorReviews" rows="12" placeholder="Paste competitor Google reviews here…"></textarea>
      </div>
    </div>

    <button class="btn-secondary" id="rankBtn" onclick="rankHypotheses()">Rank the Bets</button>

    <div class="status hidden" id="rankStatus">Analyzing reviews…</div>

    <div class="ranking-result hidden" id="rankingResult">
      <h3>Ranked Bets</h3>
      <ol class="rank-list" id="rankList"></ol>
      <div class="rank-reason">
        <h4>Why this ranking</h4>
        <div id="rankReason"></div>
      </div>
    </div>
  </div>

</div>

<script>
  let pdfBase64 = null;
  let generatedCards = [];

  document.getElementById('pdfInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById('fileName').textContent = file.name;
    const reader = new FileReader();
    reader.onload = function(ev) {
      pdfBase64 = ev.target.result.split(',')[1];
    };
    reader.readAsDataURL(file);
  });

  function setTab(cardIndex, tabName) {
    const card = document.querySelectorAll('.card')[cardIndex];
    card.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    card.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    card.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');
    card.querySelector(`.tab-content[data-tab="${tabName}"]`).classList.add('active');
  }

  function renderCards(cards) {
    generatedCards = cards;
    const grid = document.getElementById('cardsGrid');
    grid.innerHTML = '';

    cards.forEach((card, i) => {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `
        <div class="card-header">
          <span class="card-number">${String(i + 1).padStart(2, '0')}</span>
          <span class="card-title">${card.title}</span>
          <span class="card-subtitle">${card.tag || ''}</span>
        </div>
        <div class="tab-bar">
          <button class="tab active" data-tab="hypothesis" onclick="setTab(${i},'hypothesis')">Hypothesis</button>
          <button class="tab" data-tab="why" onclick="setTab(${i},'why')">Why</button>
          <button class="tab" data-tab="measurements" onclick="setTab(${i},'measurements')">Measurements</button>
        </div>
        <div class="tab-content active" data-tab="hypothesis">${card.hypothesis}</div>
        <div class="tab-content" data-tab="why">${card.why}</div>
        <div class="tab-content" data-tab="measurements">${card.measurements}</div>
      `;
      grid.appendChild(el);
    });

    grid.classList.remove('hidden');
    document.getElementById('reviewDivider').classList.remove('hidden');
    document.getElementById('reviewSection').classList.remove('hidden');
  }

  async function generateHypotheses() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const briefText = document.getElementById('briefText').value.trim();

    if (!apiKey) { alert('Please enter your API key.'); return; }
    if (!briefText && !pdfBase64) { alert('Please enter a brief or upload a PDF.'); return; }

    document.getElementById('generateBtn').disabled = true;
    document.getElementById('status').classList.remove('hidden');
    document.getElementById('cardsGrid').classList.add('hidden');
    document.getElementById('reviewDivider').classList.add('hidden');
    document.getElementById('reviewSection').classList.add('hidden');

    const systemPrompt = `You are a brand strategy and design hypothesis expert. Given a client brief, generate exactly 5 distinct design hypotheses. Each hypothesis should represent a genuinely different strategic bet on what the brand's core positioning and design direction should be.

Return ONLY valid JSON with this exact structure, no markdown, no preamble:
{
  "hypotheses": [
    {
      "title": "Short evocative title",
      "tag": "2-word descriptor",
      "hypothesis": "The core design hypothesis — what this bet is and what it would look like if true.",
      "why": "The strategic rationale — why this direction, what market insight drives it, what competitor gap it exploits.",
      "measurements": "How you would know if this bet is working — specific design quality criteria and success signals."
    }
  ]
}`;

    const userContent = pdfBase64
      ? [
          { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: pdfBase64 } },
          { type: 'text', text: briefText ? `Additional context: ${briefText}\n\nGenerate 5 design hypotheses from this brief.` : 'Generate 5 design hypotheses from this brief.' }
        ]
      : briefText;

    try {
      const response = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
        body: JSON.stringify({
          model: 'claude-haiku-4-5',
          max_tokens: 3000,
          system: systemPrompt,
          messages: [{ role: 'user', content: userContent }]
        })
      });

      const data = await response.json();
      const text = data.content?.[0]?.text || '';
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      renderCards(parsed.hypotheses);
      document.getElementById('status').classList.add('hidden');
    } catch (err) {
      document.getElementById('status').textContent = 'Error: ' + err.message;
    }

    document.getElementById('generateBtn').disabled = false;
  }

  async function rankHypotheses() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const clientReviews = document.getElementById('clientReviews').value.trim();
    const competitorReviews = document.getElementById('competitorReviews').value.trim();

    if (!clientReviews && !competitorReviews) {
      alert('Please paste at least one set of reviews.');
      return;
    }

    if (generatedCards.length === 0) {
      alert('Please generate hypotheses first.');
      return;
    }

    document.getElementById('rankBtn').disabled = true;
    document.getElementById('rankStatus').classList.remove('hidden');
    document.getElementById('rankingResult').classList.add('hidden');

    const cardSummaries = generatedCards.map((c, i) =>
      `Bet ${i + 1}: "${c.title}" — ${c.hypothesis}`
    ).join('\n\n');

    const systemPrompt = `You are a brand strategist analyzing Google reviews to determine which strategic bet is most strongly supported by real customer voice.

You will receive:
1. Five hypothesis bets from a Designer Hypothesis Incubator
2. Reviews from the client's own Google Business Profile
3. Reviews from competitor Google Business Profiles

Your job is to analyze the contrast between client and competitor reviews to determine which bets are most grounded in real market reality versus which are based on wishful thinking.

Look for:
- What customers consistently praise or notice about the client that competitors don't offer
- What competitors are missing or getting criticized for (even subtly)
- What emotional language customers use — not just what they say but how they say it
- Gaps between what the client thinks their differentiator is and what customers actually value

Return ONLY valid JSON, no markdown, no preamble:
{
  "ranked": [
    { "rank": 1, "title": "exact title of bet", "signal": "brief 3-5 word signal" },
    { "rank": 2, "title": "exact title of bet", "signal": "brief 3-5 word signal" },
    { "rank": 3, "title": "exact title of bet", "signal": "brief 3-5 word signal" },
    { "rank": 4, "title": "exact title of bet", "signal": "brief 3-5 word signal" },
    { "rank": 5, "title": "exact title of bet", "signal": "brief 3-5 word signal" }
  ],
  "reasoning": "2-3 paragraphs explaining what the reviews revealed, what contrast emerged between client and competitor language, and why the top-ranked bet is the strongest strategic direction."
}`;

    const userMessage = `Here are the five hypothesis bets:\n\n${cardSummaries}\n\n---\n\nClient Reviews:\n${clientReviews || 'None provided'}\n\n---\n\nCompetitor Reviews:\n${competitorReviews || 'None provided'}\n\nRank the five bets based on what the reviews reveal.`;

    try {
      const response = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
        body: JSON.stringify({
          model: 'claude-haiku-4-5',
          max_tokens: 1500,
          system: systemPrompt,
          messages: [{ role: 'user', content: userMessage }]
        })
      });

      const data = await response.json();
      const text = data.content?.[0]?.text || '';
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      const list = document.getElementById('rankList');
      list.innerHTML = '';
      parsed.ranked.forEach(item => {
        const li = document.createElement('li');
        li.className = 'rank-item';
        li.innerHTML = `
          <span class="rank-num">${item.rank}</span>
          <span class="rank-title">${item.title}</span>
          <span class="rank-tag">${item.signal}</span>
        `;
        list.appendChild(li);
      });

      document.getElementById('rankReason').innerHTML = parsed.reasoning.replace(/\n\n/g, '<br><br>');
      document.getElementById('rankingResult').classList.remove('hidden');
      document.getElementById('rankStatus').classList.add('hidden');
    } catch (err) {
      document.getElementById('rankStatus').textContent = 'Error: ' + err.message;
    }

    document.getElementById('rankBtn').disabled = false;
  }
</script>
</body>
</html>
